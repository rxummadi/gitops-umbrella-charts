# bundles/springboot-bundle/values.yaml

# Feature toggles - override per service
app:
  enabled: true
  image:
    repository: ""              # REQUIRED: set per service
    tag: "latest"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  service:
    port: 8080
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

configmap:
  enabled: true
  data: {}                      # override per service/environment

istio:
  enabled: true
  gateway: "istio-system/main-gateway"
  host: ""                      # REQUIRED if istio enabled: e.g. service-a.your-domain.com
  retries:
    attempts: 3
    perTryTimeout: "10s"